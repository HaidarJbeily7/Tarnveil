services:
  postgres:
    image: postgres:16-alpine
    container_name: tarnveil-postgres
    environment:
      POSTGRES_USER: tarnveil
      POSTGRES_PASSWORD: tarnveil
      POSTGRES_DB: tarnveil
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarnveil -d tarnveil"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: tarnveil-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  postgres_data:
  redis_data:
