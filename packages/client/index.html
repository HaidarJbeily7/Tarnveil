<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>…</title>
    <style>
      /* Page shell. Every UI surface beyond this lives in src/ui/. */
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #0e1115;
        overflow: hidden;
        color: #e8e2cf;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      body {
        background:
          radial-gradient(circle at 30% 20%, rgba(80, 100, 130, 0.15), transparent 40%),
          radial-gradient(circle at 70% 80%, rgba(120, 80, 50, 0.10), transparent 40%),
          #0e1115;
      }
      #game { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }

      /* Settings slide-out panel. The settings entry button now lives
       * inside the in-world HUD (topRight minimap header) and is wired
       * by src/settings.ts after the HUD mounts. */
      #settings-overlay {
        position: fixed; inset: 0;
        background: rgba(0, 0, 0, 0.4);
        opacity: 0; pointer-events: none;
        transition: opacity 0.2s;
        z-index: 28;
      }
      #settings-overlay.open { opacity: 1; pointer-events: auto; }

      #hud-settings {
        position: fixed; top: 0; right: 0; bottom: 0;
        width: 320px; max-width: 90vw;
        background: #16191e;
        border-left: 1px solid #3a4250;
        padding: 18px 20px;
        transform: translateX(100%);
        transition: transform 0.22s ease-out;
        z-index: 30;
        display: flex; flex-direction: column; gap: 16px;
        box-shadow: -8px 0 24px rgba(0, 0, 0, 0.4);
      }
      #hud-settings.open { transform: translateX(0); }
      #hud-settings header { display: flex; align-items: center; justify-content: space-between; }
      #hud-settings h2 { margin: 0; font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase; color: #ffd166; }
      #settings-close {
        background: transparent; border: none; color: #8a8e96; font-size: 22px; cursor: pointer;
        padding: 0; line-height: 1; transition: color 0.15s;
      }
      #settings-close:hover { color: #e8e2cf; }
      .setting-row { display: flex; flex-direction: column; gap: 6px; font-size: 12px; }
      .setting-row label { display: flex; align-items: center; gap: 8px; color: #8a8e96; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
      .setting-row .value { color: #ffd166; margin-left: auto; font-variant-numeric: tabular-nums; }
      .setting-row input[type="range"] { width: 100%; accent-color: #ffd166; }
      .setting-row input[type="checkbox"] { accent-color: #ffd166; width: 16px; height: 16px; }
      .setting-row .desc { color: #8a8e96; font-size: 11px; }
      .setting-row button {
        background: rgba(255, 209, 102, 0.12);
        border: 1px solid #ffd166;
        color: #ffd166; padding: 6px 12px; border-radius: 4px;
        font-family: inherit; font-size: 12px; cursor: pointer;
        text-transform: uppercase; letter-spacing: 0.06em;
        align-self: flex-start;
        transition: background 0.15s;
      }
      .setting-row button:hover { background: rgba(255, 209, 102, 0.24); }
      #settings-meta { margin-top: auto; padding-top: 12px; border-top: 1px solid #3a4250; color: #8a8e96; font-size: 10px; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="settings-overlay"></div>
    <aside id="hud-settings" aria-label="settings">
      <header>
        <h2>Settings</h2>
        <button id="settings-close" aria-label="close">×</button>
      </header>
      <div class="setting-row">
        <label>
          <span>Camera Zoom</span>
          <span class="value" id="setting-zoom-value">1.00</span>
        </label>
        <input id="setting-zoom" type="range" min="0.5" max="2" step="0.05" value="1" />
        <span class="desc">How close the camera sits to your character.</span>
      </div>
      <div class="setting-row">
        <label>
          <input id="setting-nametags" type="checkbox" checked />
          <span>Show Name Tags</span>
        </label>
        <span class="desc">Toggle the floating labels above other players.</span>
      </div>
      <div class="setting-row">
        <label>
          <input id="setting-motion" type="checkbox" />
          <span>Reduce Motion</span>
        </label>
        <span class="desc">Disables idle and walking animations.</span>
      </div>
      <div class="setting-row">
        <button id="setting-reset">Reset Position</button>
        <span class="desc">Teleport your character back to the spawn tile.</span>
      </div>
      <div id="settings-meta">Esc to close · settings persist in this browser</div>
    </aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
